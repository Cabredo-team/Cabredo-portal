<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabredo Portal</title>
<style>
  :root{
    --ks:#C9A227;   --ks-bg:#FBF3DC;   --ks-tx:#7A6318;
    --an:#4C8058;   --an-bg:#EAF3EC;   --an-tx:#2C4A34;
    --rf:#7A2E2E;   --rf-bg:#F3E4E4;   --rf-tx:#5C2222;
    --rd:#C0645A;   --rd-bg:#F8E9E6;   --rd-tx:#8C463D;

    --brand:#13261C;
    --brand-2:#1C3527;

    --ink:#1D1D1F;
    --ink-secondary:#6E6E73;
    --ink-muted:#9A9AA0;
    --surface:#FFFFFF;
    --surface-1:#F6F6F4;
    --border:#E4E4E1;
    --border-strong:#D2D2CE;
    --radius-lg:16px;
    --radius-md:12px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    background:var(--surface-1);
    -webkit-font-smoothing:antialiased;
  }
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  table{border-collapse:collapse;width:100%;}
  input,select{font-family:inherit;}

  .topbar{
    background:var(--brand);color:#fff;
    height:64px;padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:60;
  }
  .brand-lockup{display:flex;flex-direction:column;line-height:1.05;cursor:pointer;}
  .brand-lockup .b1{font-size:18px;font-weight:700;letter-spacing:0.04em;}
  .brand-lockup .b2{font-size:9.5px;font-weight:600;letter-spacing:0.28em;color:rgba(255,255,255,0.55);}
  .tagline{font-size:12.5px;color:rgba(255,255,255,0.55);margin-left:22px;display:none;}
  @media (min-width:840px){.tagline{display:block;}}
  .topbar-left{display:flex;align-items:center;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .tb-icon{
    width:36px;height:36px;border-radius:50%;position:relative;border:none;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.08);transition:background .15s ease;
  }
  .tb-icon:hover{background:rgba(255,255,255,0.16);}
  .tb-icon .badge{
    position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;border-radius:8px;
    background:var(--rd);color:#fff;font-size:10px;font-weight:700;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
    border:2px solid var(--brand);
  }
  .tb-divider{width:1px;height:28px;background:rgba(255,255,255,0.14);margin:0 2px;}
  .dealer-id{text-align:right;line-height:1.25;}
  .dealer-id .d-name{font-size:12.5px;font-weight:700;letter-spacing:0.02em;}
  .dealer-id .d-tier{font-size:11px;color:rgba(255,255,255,0.55);}
  .tb-avatar{
    width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.14);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  }
  .tb-profile{display:flex;align-items:center;gap:10px;}

  .shell{display:flex;align-items:flex-start;}

  .sidebar{
    width:230px;flex-shrink:0;background:var(--surface);
    border-right:1px solid var(--border);
    min-height:calc(100vh - 64px);
    padding:18px 12px;display:flex;flex-direction:column;
    position:sticky;top:64px;
  }
  .nav-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px;}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
    font-size:13.5px;font-weight:500;color:var(--ink-secondary);border:none;background:none;
    transition:background .12s ease, color .12s ease;width:100%;text-align:left;
  }
  .nav-item svg{flex-shrink:0;}
  .nav-item:hover{background:var(--surface-1);color:var(--ink);}
  .nav-item.active{background:var(--brand);color:#fff;font-weight:600;}
  .nav-item .nav-badge{
    margin-left:auto;background:var(--rd-bg);color:var(--rd-tx);font-size:10.5px;font-weight:700;
    padding:1px 7px;border-radius:10px;
  }
  .nav-item.active .nav-badge{background:rgba(255,255,255,0.22);color:#fff;}
  .sidebar-spacer{flex:1;}
  .sidebar-help{border-top:1px solid var(--border);padding-top:14px;margin-top:10px;}
  .sidebar-help .sh-title{font-size:12.5px;font-weight:700;margin:0 0 6px 12px;}
  .sidebar-help .sh-line{display:flex;align-items:center;gap:9px;padding:6px 12px;font-size:12px;color:var(--ink-secondary);}

  .main{flex:1;min-width:0;padding:30px 36px 70px;}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:20px;}
  .page-head h1{font-size:25px;font-weight:700;letter-spacing:-0.01em;margin:0 0 4px;}
  .page-head p{font-size:13.5px;color:var(--ink-secondary);margin:0;}
  .btn-primary{
    display:flex;align-items:center;gap:8px;background:var(--brand);color:#fff;border:none;
    padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;
    transition:background .15s ease, transform .15s ease;flex-shrink:0;white-space:nowrap;
  }
  .btn-primary:hover{background:var(--brand-2);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn-secondary{
    display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--ink);
    border:1px solid var(--border-strong);padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;
    transition:background .15s ease;flex-shrink:0;white-space:nowrap;
  }
  .btn-secondary:hover{background:var(--surface-1);}
  .btn-ghost{background:none;border:none;color:var(--ink-secondary);font-size:13px;font-weight:600;padding:8px 0;}
  .btn-ghost:hover{color:var(--ink);}
  .btn-danger-ghost{background:none;border:none;color:var(--rf);font-size:12px;font-weight:600;}

  .content-grid{display:grid;grid-template-columns:1fr 296px;gap:28px;align-items:start;}
  @media (max-width:1080px){.content-grid{grid-template-columns:1fr;}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
  .section{margin-bottom:28px;}
  .section:last-child{margin-bottom:0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .section-title{font-size:15.5px;font-weight:700;letter-spacing:-0.005em;margin:0;}
  .section-link{font-size:12.5px;color:var(--ink-secondary);font-weight:600;background:none;border:none;padding:0;}
  .section-link:hover{color:var(--ink);}

  .crumb{font-size:12.5px;color:var(--ink-secondary);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .crumb .c-sep{color:var(--ink-muted);}
  .crumb-line{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .crumb-line.ks{background:var(--ks-bg);color:var(--ks-tx);}
  .crumb-line.an{background:var(--an-bg);color:var(--an-tx);}
  .crumb-line.rf{background:var(--rf-bg);color:var(--rf-tx);}
  .crumb-line.rd{background:var(--rd-bg);color:var(--rd-tx);}

  .pinned-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
  .pin-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
    padding:13px 14px;position:relative;transition:border-color .15s ease, transform .15s ease;cursor:pointer;
  }
  .pin-card:hover{border-color:var(--border-strong);transform:translateY(-2px);}
  .pin-accent{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius-md) var(--radius-md) 0 0;}
  .pin-accent.ks{background:var(--ks);} .pin-accent.an{background:var(--an);}
  .pin-accent.rf{background:var(--rf);} .pin-accent.rd{background:var(--rd);}
  .pin-flag{position:absolute;top:12px;right:12px;background:none;border:none;padding:0;}
  .pin-name{font-size:13.5px;font-weight:700;margin:8px 0 3px;padding-right:20px;letter-spacing:-0.005em;}
  .pin-meta{font-size:11.5px;color:var(--ink-secondary);margin:0 0 10px;}
  .line-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;}
  .line-tag .swatch{width:7px;height:7px;border-radius:50%;}
  .line-tag.ks{color:var(--ks-tx);} .line-tag.ks .swatch{background:var(--ks);}
  .line-tag.an{color:var(--an-tx);} .line-tag.an .swatch{background:var(--an);}
  .line-tag.rf{color:var(--rf-tx);} .line-tag.rf .swatch{background:var(--rf);}
  .line-tag.rd{color:var(--rd-tx);} .line-tag.rd .swatch{background:var(--rd);}

  .dtable th{
    text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
    color:var(--ink-muted);padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface-1);
  }
  .dtable td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .dtable tbody tr{transition:background .12s ease;cursor:pointer;}
  .dtable tbody tr:hover{background:var(--surface-1);}
  .dtable tbody tr:last-child td{border-bottom:none;}
  .cell-title{font-weight:600;color:var(--ink);}
  .cell-sub{font-size:11.5px;color:var(--ink-secondary);margin-top:1px;}
  .cell-price{font-weight:600;white-space:nowrap;}
  .cell-price .net{color:var(--ink-secondary);font-weight:500;}
  .status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;display:inline-block;}
  .status-pill.progress{background:var(--ks-bg);color:var(--ks-tx);}
  .status-pill.wait{background:#EAF1FB;color:#2C4A6E;}
  .status-pill.prod{background:var(--an-bg);color:var(--an-tx);}
  .status-pill.shipped{background:#EAF1FB;color:#2C4A6E;}

  .catalog-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cat-tile{border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 12px 11px;position:relative;overflow:hidden;transition:border-color .15s ease, transform .15s ease;background:none;text-align:left;width:100%;}
  .cat-tile:hover{border-color:var(--border-strong);transform:translateY(-2px);}
  .cat-tile-accent{width:26px;height:5px;border-radius:3px;margin-bottom:10px;}
  .cat-tile-accent.ks{background:var(--ks);} .cat-tile-accent.an{background:var(--an);}
  .cat-tile-accent.rf{background:var(--rf);} .cat-tile-accent.rd{background:var(--rd);}
  .cat-tile .ct-name{font-size:12.5px;font-weight:700;margin:0 0 2px;}
  .cat-tile .ct-sub{font-size:10.5px;color:var(--ink-secondary);margin:0;}

  .side-card{padding:16px 16px 14px;margin-bottom:18px;}
  .side-card h3{font-size:13.5px;font-weight:700;margin:0 0 12px;}
  .announcement{display:flex;gap:10px;padding-bottom:11px;margin-bottom:11px;border-bottom:1px solid var(--border);}
  .announcement:last-child{border:none;margin:0;padding:0;}
  .announcement .a-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);margin-top:6px;flex-shrink:0;}
  .announcement p{margin:0;font-size:12.5px;line-height:1.45;}
  .announcement .a-title{font-weight:700;margin-bottom:2px;}
  .announcement .a-time{font-size:11px;color:var(--ink-muted);margin-top:3px;}
  .msg{display:flex;gap:9px;align-items:flex-start;padding:8px 0;}
  .msg .m-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--ink-secondary);flex-shrink:0;}
  .msg .m-body{flex:1;min-width:0;}
  .msg .m-name{font-size:12.5px;font-weight:700;margin:0;display:flex;align-items:center;gap:6px;}
  .msg .m-snippet{font-size:11.5px;color:var(--ink-secondary);margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .unread-dot{width:6px;height:6px;border-radius:50%;background:var(--rf);flex-shrink:0;}

  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:28px;max-width:480px;}
  .form-card label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-secondary);margin:0 0 6px;}
  .form-card input[type=text],.form-card select{
    width:100%;height:42px;border-radius:9px;border:1px solid var(--border-strong);padding:0 14px;
    font-size:14px;color:var(--ink);margin-bottom:20px;outline:none;background:var(--surface);
  }
  .form-card input[type=text]:focus,.form-card select:focus{border-color:var(--brand);}
  .form-hint{font-size:12px;color:var(--ink-muted);margin:-14px 0 20px;}

  .line-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;}
  .line-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;overflow:hidden;text-align:left;transition:border-color .15s ease, transform .15s ease;}
  .line-card:hover{border-color:var(--border-strong);transform:translateY(-3px);}
  .line-card .lc-band{height:64px;}
  .line-card .lc-band.ks{background:var(--ks);} .line-card .lc-band.an{background:var(--an);}
  .line-card .lc-band.rf{background:var(--rf);} .line-card .lc-band.rd{background:var(--rd);}
  .line-card .lc-body{padding:18px 20px 20px;}
  .line-card .lc-name{font-size:17px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em;}
  .line-card .lc-desc{font-size:12.5px;color:var(--ink-secondary);line-height:1.5;margin:0 0 14px;min-height:38px;}
  .line-card .lc-cta{font-size:12.5px;font-weight:700;color:var(--brand);}

  .cat-tabs-wrap{position:sticky;top:64px;z-index:40;background:var(--surface-1);padding:10px 0 12px;margin:0 0 4px;border-bottom:1px solid var(--border);}
  .cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .cat-tab{padding:7px 13px;border-radius:20px;border:1px solid var(--border-strong);background:var(--surface);font-size:12px;font-weight:600;color:var(--ink-secondary);}
  .cat-tab.active{background:var(--brand);border-color:var(--brand);color:#fff;}
  .cat-tab-count{font-size:10.5px;opacity:0.65;font-weight:600;}
  .cat-search{width:100%;max-width:340px;height:36px;border-radius:8px;border:1px solid var(--border-strong);padding:0 12px;font-size:13px;background:var(--surface);}
  .empty-hint{color:var(--ink-muted);font-size:13px;padding:24px 4px;grid-column:1/-1;}
  .cab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding-top:14px;}
  .cab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;text-align:left;transition:border-color .15s ease, transform .15s ease;}
  .cab-card.available:hover{border-color:var(--border-strong);transform:translateY(-2px);}
  .cab-card.unavailable{opacity:0.55;cursor:not-allowed;}
  .cab-thumb{height:56px;display:flex;align-items:center;justify-content:center;padding:4px;}
  .cab-thumb .cab-icon{opacity:0.9;}
  .cab-photo{max-width:100%;max-height:100%;object-fit:contain;}
  .cab-photo-lg{max-width:88%;max-height:88%;object-fit:contain;}
  .cab-icon-fallback{display:flex;align-items:center;justify-content:center;}
  .cab-body{padding:8px 10px 10px;}
  .cab-name{font-size:11.5px;font-weight:700;margin:0 0 3px;line-height:1.25;}
  .cab-code{font-size:10px;color:var(--ink-muted);font-family:ui-monospace,Menlo,monospace;margin:0 0 6px;}
  .cab-avail-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:12px;background:var(--surface-1);color:var(--ink-muted);}

  .detail-layout{display:grid;grid-template-columns:300px 1fr;gap:28px;}
  @media (max-width:960px){.detail-layout{grid-template-columns:1fr;}}
  .detail-image{height:220px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;}
  .detail-panel .dp-name{font-size:20px;font-weight:700;margin:14px 0 4px;letter-spacing:-0.01em;}
  .detail-panel .dp-code{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ink-secondary);background:var(--surface-1);display:inline-block;padding:5px 10px;border-radius:7px;margin-bottom:6px;word-break:break-all;}
  .config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;margin-bottom:16px;}
  .config-card h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-muted);margin:0 0 14px;}
  .config-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:4px;}
  .config-field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-secondary);margin-bottom:5px;}
  .config-field select,.config-field input[type=number]{width:100%;height:38px;border-radius:8px;border:1px solid var(--border-strong);padding:0 12px;font-size:13px;background:var(--surface);}
  .field-hint{font-size:11px;color:var(--ink-muted);margin-top:5px;}
  .check-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13px;}
  .check-row input{width:16px;height:16px;}
  .mod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:4px 20px;}
  .qty-stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border-strong);border-radius:9px;width:fit-content;}
  .qty-stepper button{width:34px;height:34px;background:none;border:none;font-size:15px;font-weight:700;color:var(--ink);}
  .qty-stepper button:hover{background:var(--surface-1);}
  .qty-stepper span{width:34px;text-align:center;font-size:13px;font-weight:600;}
  .breakdown{background:var(--surface-1);border-radius:var(--radius-md);padding:16px 18px;margin-top:4px;}
  .breakdown-line{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--ink-secondary);}
  .breakdown-line.total{border-top:1px solid var(--border-strong);margin-top:8px;padding-top:10px;font-size:14px;font-weight:700;color:var(--ink);}
  .breakdown-line.net{font-size:12.5px;color:var(--ink-secondary);padding-top:0;}
  .dp-price{display:flex;align-items:baseline;gap:10px;margin:16px 0;}
  .dp-price .list{font-size:24px;font-weight:700;}
  .dp-price .net{font-size:13px;color:var(--ink-secondary);}

  .qty-mini{display:flex;align-items:center;gap:6px;}
  .qty-mini button{width:26px;height:26px;border-radius:6px;border:1px solid var(--border-strong);background:var(--surface);font-weight:700;font-size:13px;}
  .qty-mini span{min-width:20px;text-align:center;font-size:13px;font-weight:600;}
  .totals-bar{display:flex;align-items:center;justify-content:flex-end;gap:28px;padding:16px 20px;background:var(--surface-1);border-top:1px solid var(--border);}
  .totals-bar .t-block{text-align:right;}
  .totals-bar .t-label{font-size:11px;color:var(--ink-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
  .totals-bar .t-val{font-size:17px;font-weight:700;}
  .action-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;}

  .confirm-wrap{max-width:480px;margin:60px auto;text-align:center;}
  .confirm-icon{width:64px;height:64px;border-radius:50%;background:var(--an-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
  .confirm-wrap h1{font-size:22px;margin:0 0 8px;}
  .confirm-wrap p{font-size:14px;color:var(--ink-secondary);margin:0 0 4px;}
  .confirm-ref{display:inline-block;margin:16px 0 26px;padding:8px 16px;background:var(--surface-1);border-radius:8px;font-family:ui-monospace,Menlo,monospace;font-size:13px;}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);
    background:var(--brand);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);z-index:100;max-width:320px;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  @media (max-width:840px){
    .sidebar{display:none;}
    .main{padding:22px 18px 50px;}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div class="brand-lockup" onclick="nav('dashboard')"><span class="b1">CABREDO</span><span class="b2">PORTAL</span></div>
      <span class="tagline">Custom cabinetry, crafted for you</span>
    </div>

/* ================= CABINET ICON GENERATOR ================= */
/* Produces a distinct schematic front-view icon per cabinet based on its
   actual door count, drawer count, shape family (corner/panel/open), and
   aspect ratio — so every catalog item gets its own picture with no external
   image files needed. Returns inner SVG markup for a 0 0 24 24 viewBox. */
function cabShapeInner(c, dotFill){
  const isCorner = c.category==='Base Corners' || c.category==='Wall Corners' || /Corner|Diagonal|Angle/i.test(c.name);
  const isPanel = !!c.accessory;
  const isOpen = !isPanel && (c.doors||0)===0 && (c.drawers?c.drawers.length:0)===0;
  const heightRef = c.heights ? c.heights[Math.floor(c.heights.length/2)] : ((c.dims&&c.dims.height) || (CATEGORY_DIMS[c.category]&&CATEGORY_DIMS[c.category].height) || 30);
  const widthRef = c.widths[Math.floor(c.widths.length/2)] || 24;
  const ratio = heightRef/widthRef;
  let bx=3, by=4, bw=18, bh=16;
  if(ratio>1.6){ bx=7.5; by=1.5; bw=9; bh=21; }
  else if(ratio<0.55){ bx=2; by=7; bw=20; bh=10; }

  if(isPanel){
    return `<path d="M ${bx+bw*0.32} ${by} L ${bx+bw} ${by} L ${bx+bw*0.68} ${by+bh} L ${bx} ${by+bh} Z"/>`;
  }
  if(isCorner){
    const mx=bx+bw*0.55, my=by+bh*0.5;
    return `<path d="M ${bx} ${by+bh} L ${bx} ${my} L ${mx} ${by} L ${bx+bw} ${by} L ${bx+bw} ${by+bh} Z"/>`+
           `<line x1="${mx}" y1="${by+bh*0.12}" x2="${mx}" y2="${by+bh}"/>`+
           `<circle cx="${mx-1.6}" cy="${my+bh*0.18}" r="0.7" fill="${dotFill}"/>`;
  }

  let out = `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="1.2"/>`;
  const nDrawers = c.drawers ? c.drawers.length : 0;
  const nDoors = c.doors||0;
  let y = by;
  if(nDrawers>0){
    const drawerFrac = nDoors>0 ? Math.min(0.55, 0.14*nDrawers+0.1) : 1;
    const totalDrawerH = bh*drawerFrac;
    const each = totalDrawerH/nDrawers;
    for(let i=0;i<nDrawers;i++){
      out += `<rect x="${bx+0.7}" y="${y+0.5}" width="${bw-1.4}" height="${Math.max(each-1,1.2)}" rx="0.4"/>`;
      out += `<line x1="${bx+bw*0.38}" y1="${y+each/2}" x2="${bx+bw*0.62}" y2="${y+each/2}"/>`;
      y += each;
    }
  }
  const doorH = (by+bh)-y;
  if(nDoors>0 && doorH>1.5){
    if(nDoors===1){
      out += `<rect x="${bx+0.7}" y="${y+0.5}" width="${bw-1.4}" height="${doorH-1}" rx="0.4"/>`;
      out += `<circle cx="${bx+bw-2.1}" cy="${y+doorH/2}" r="0.7" fill="${dotFill}"/>`;
    } else {
      const cols = Math.min(nDoors,4);
      const dw = (bw-1.4)/cols;
      for(let i=0;i<cols;i++){
        const dx = bx+0.7+i*dw;
        out += `<rect x="${dx}" y="${y+0.5}" width="${dw-0.6}" height="${doorH-1}" rx="0.4"/>`;
        const knobX = (i%2===0)? dx+dw-1.3 : dx+1.0;
        out += `<circle cx="${knobX}" cy="${y+doorH/2}" r="0.6" fill="${dotFill}"/>`;
      }
    }
  } else if(isOpen){
    const shelves = 2;
    for(let i=1;i<=shelves;i++){
      const sy = by + bh*(i/(shelves+1));
      out += `<line x1="${bx+0.9}" y1="${sy}" x2="${bx+bw-0.9}" y2="${sy}"/>`;
    }
  }
  return out;
}
function cabIconSVG(c, color, size){
  return `<svg class="cab-icon" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.4">${cabShapeInner(c,color)}</svg>`;
}
/* Real catalog photo (extracted from the Ravir PDFs) with the schematic SVG as a fallback
   for the rare item that has no photo on file. */
function iconFallbackEl(id, color, size){
  const c = cab(id);
  const div = document.createElement('div');
  div.className = 'cab-icon-fallback';
  div.style.width = size+'px'; div.style.height = size+'px';
  div.innerHTML = cabIconSVG(c, color, size);
  return div;
}
function cabPhotoHTML(c, color, size, extraClass){
  return `<img src="images/${encodeURIComponent(c.id)}.png" alt="${c.name}" class="cab-photo ${extraClass||''}" loading="lazy" onerror="this.replaceWith(iconFallbackEl('${c.id}','${color}',${size}))">`;
}

/* ================= PRICING ENGINE ================= */
function doorStyleObj(id){ return DOOR_STYLES.find(d=>d.id===id); }
function panelObj(id){ return PANELS.find(p=>p.id===id); }
function speciesObj(id){ return SPECIES.find(s=>s.id===id); }
function sheenObj(id){ return SHEENS.find(s=>s.id===id); }
function finishObj(id){ return FINISH_COLORS.find(f=>f.id===id); }
function insertObj(id){ return INSERTS.find(i=>i.id===id); }
function toeKickObj(id){ return TOE_KICK.find(t=>t.id===id); }

function doorHingeCount(heightIn){ return heightIn<=36 ? 2 : 3+Math.floor((heightIn-36)/18); }
function boxSqFt(w,h,d){ return (2*(h*d) + (w*d) + (w*h) + (w*d))/144; }
function faceSqFt(w,h){ return (w*h)/144; }

function itemDims(item){
  const c = cab(item.cabId);
  const catDims = CATEGORY_DIMS[c.category] || {};
  const override = c.dims || {};
  const height = item.height || override.height || catDims.height || 30;
  const depth = item.depth || override.depth || catDims.depth || 24;
  return {width:item.width, height, depth};
}

function defaultItemConfig(cabId, line){
  const c = cab(cabId);
  const wMid = Math.round(((c.widths[0]+c.widths[c.widths.length-1])/2)*16)/16;
  return {
    cabId, width: wMid,
    height: c.heights ? c.heights[Math.floor(c.heights.length/2)] : null,
    depth: null,
    doorStyle:'standard', panel:'flat14', species:'pgMaple', sheen:'sheen5', finish:'white',
    drawerBoxMaterial:'poplar',
    mods:{ finishedLeft:false, finishedRight:false, applianceSide:false, toeKick:'none',
           rolloutQty:0, insert:'none', drawerLogo:'none', customModPct:0, customModDesc:'' },
    qty:1
  };
}

/* Returns {breakdown:[{label,amount}], listUnit, netUnit} for ONE unit (qty=1) */
function priceBreakdown(item, line){
  const c = cab(item.cabId);
  const dims = itemDims(item);
  const fSqFt = faceSqFt(dims.width, dims.height);
  const bSqFt = boxSqFt(dims.width, dims.height, dims.depth);
  const ds = doorStyleObj(item.doorStyle);
  const pn = panelObj(item.panel);
  const sp = speciesObj(item.species);
  const sh = sheenObj(item.sheen);
  const lineMult = LINES[line].mult;
  const rows = [];
  let subtotal = 0;
  function add(label, amount){ if(amount){ rows.push({label, amount}); subtotal += amount; } }

  if(c.accessory){
    add('Door style / frame bead design fee', ds.fee);
    add('Panel profile ('+fSqFt.toFixed(2)+' sq ft)', pn.sqftRate*fSqFt);
    add('Finishing ($8/sq ft)', 8*fSqFt);
    add('Labor & handling', 45);
  } else {
    add('Box material ('+bSqFt.toFixed(2)+' sq ft @ $2.15)', bSqFt*2.15);
    const isBase = c.category==='Base Cabinets' || c.category==='Base Corners' || c.category==='Vanities' || c.category==='Office';
    const isWall = c.category==='Walls' || c.category==='Wall Corners';
    const isTall = c.category==='Talls';
    if(isBase) add('Base assembly labor', 66);
    if(isWall) add('Wall assembly labor', 63);
    if(isTall) add('Tall assembly labor', dims.height>96 ? 230 : 155);

    const doorDrawerCount = c.doors + c.drawers.length;
    add('Door style design fee ('+doorDrawerCount+' × $'+ds.fee+')', ds.fee*doorDrawerCount);
    add('Panel profile ('+fSqFt.toFixed(2)+' sq ft @ $'+pn.sqftRate+')', pn.sqftRate*fSqFt);

    const finishRate = isTall ? 17.75 : 15.10;
    add((isTall?'Tall':isWall?'Wall':'Base')+' finishing ('+fSqFt.toFixed(2)+' sq ft @ $'+finishRate+')', finishRate*fSqFt);

    if(c.doors>0){
      const hinges = doorHingeCount(dims.height);
      add('Door hardware ('+c.doors+' door(s), '+hinges+' hinges ea. @ $24/door)', 24*c.doors);
    }
    if(c.drawers.length>0){
      add('Drawer hardware ('+c.drawers.length+' × $56)', 56*c.drawers.length);
      let drawerBoxTotal = 0;
      c.drawers.forEach(hIn => { drawerBoxTotal += drawerBoxUnitPrice(dims.width, hIn); });
      if(item.drawerBoxMaterial==='plywood') drawerBoxTotal *= 0.95;
      add('Drawer box'+(c.drawers.length>1?'es':'')+' ('+item.drawerBoxMaterial+')', drawerBoxTotal);
    }
    if(isBase) add('Cabinet handling', 20);
    if(isWall) add('Cabinet handling', 20.20);
    if(isTall) add('Cabinet handling', 20.20);
    if(isBase) add('Cabinet packaging', 13);
    if(isWall) add('Cabinet packaging', 18);
    if(isTall) add('Cabinet packaging', 25);
  }

  add('Product line adjustment (×'+lineMult.toFixed(2)+')', subtotal*(lineMult-1));
  add('Wood species — '+sp.label+' (+'+sp.pct+'%)', subtotal*(sp.pct/100));
  add('Sheen — '+sh.label+(sh.pct? ' (+'+sh.pct+'%)':''), subtotal*(sh.pct/100));

  const m = item.mods;
  if(m.finishedLeft || m.finishedRight){
    const sideSqFt = (dims.height*dims.depth)/144;
    const sides = (m.finishedLeft?1:0)+(m.finishedRight?1:0);
    add('Finished side ×'+sides+' ('+sideSqFt.toFixed(2)+' sq ft ea.)', sides*(14 + sideSqFt*3.36 + sideSqFt*6.50));
  }
  if(m.applianceSide) add('Appliance side', 65);
  if(m.toeKick && m.toeKick!=='none'){ const tk=toeKickObj(m.toeKick); add(tk.label, tk.cost); }
  if(m.rolloutQty>0){
    const rolloutUnit = drawerBoxUnitPrice(dims.width, 4) * 2;
    add('Roll-outs ×'+m.rolloutQty, rolloutUnit*m.rolloutQty);
  }
  if(m.insert && m.insert!=='none'){ const ins=insertObj(m.insert); add(ins.label, ins.cost); }
  if(m.drawerLogo==='top') add('Drawer box logo (top drawer)', 4);
  if(m.drawerLogo==='all' && c.drawers.length>0) add('Drawer box logo (all '+c.drawers.length+' drawers)', 4*c.drawers.length);
  if(m.customModPct>0) add('Custom modification — '+(m.customModDesc||'unspecified')+' (+'+m.customModPct+'%)', subtotal*(m.customModPct/100));

  const listUnit = subtotal;
  const netUnit = listUnit*NET_MULT;
  return {breakdown:rows, listUnit, netUnit};
}
function priceFor(cabId, line, width){
  const c = cab(cabId);
  if(!c.lines.includes(line)) return null;
  const item = defaultItemConfig(cabId, line);
  item.width = width;
  const pb = priceBreakdown(item, line);
  return {list:pb.listUnit, net:pb.netUnit};
}
function codeWidthToken(n){
  const whole = Math.floor(n);
  let sixteenths = Math.round((n-whole)*16);
  let w = whole;
  if(sixteenths===16){ w+=1; sixteenths=0; }
  return sixteenths===0 ? String(w) : (w+'-'+sixteenths+'16');
}
function codeFor(item, line){
  const ds=doorStyleObj(item.doorStyle), pn=panelObj(item.panel), fn=finishObj(item.finish);
  return LINES[line].code+'-'+item.cabId+codeWidthToken(item.width)+(item.height?('x'+item.height):'')+'-'+ds.abbr+'-'+pn.abbr+'-'+fn.label.toUpperCase().replace(/[^A-Z]/g,'');
}
function computeTotals(items, line){
  let list=0,net=0,qty=0;
  items.forEach(it=>{ const pb=priceBreakdown(it,line); list+=pb.listUnit*it.qty; net+=pb.netUnit*it.qty; qty+=it.qty; });
  return {list,net,qty};
}
function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
/* Formats a decimal inch value to the nearest 1/16" as a mixed-fraction string, e.g. 23.9375 -> 23 15/16 */
function fmtWidth(n){
  if(n==null) return '';
  const whole = Math.floor(n);
  let sixteenths = Math.round((n-whole)*16);
  let w = whole;
  if(sixteenths===16){ w+=1; sixteenths=0; }
  if(sixteenths===0) return w+'"';
  let num=sixteenths, den=16;
  while(num%2===0){ num/=2; den/=2; }
  return w+' '+num+'/'+den+'"';
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer); window._toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ================= Screen: Category ================= */
function catalogItemMatches(c, q){
  if(!q) return true;
  const hay = (c.id+' '+c.name).toLowerCase();
  return hay.includes(q.toLowerCase());
}
function renderCategory(){
  const line = state.project.line;
  const allInCat = CATALOG.filter(c=>c.category===state.activeCategory && isBrowsable(c));
  const items = allInCat.filter(c=>catalogItemMatches(c, state.categoryFilter));
  const viewQuoteBtn = '<button class="btn-secondary" onclick="nav(\'quoteBuilder\')">View quote (' + state.quoteItems.length + ')</button>';
  return `
  ${breadcrumb()}
  ${pageHead('Choose a cabinet','Only options for '+LINES[line].label+' are shown as available.', viewQuoteBtn)}
  <div class="cat-tabs-wrap">
    <div class="cat-tabs">${CATEGORIES.map(c=>'<button class="cat-tab '+(c===state.activeCategory?'active':'')+'" onclick="setCategory(\''+c+'\')">'+c+' <span class="cat-tab-count">'+CATALOG.filter(x=>x.category===c && isBrowsable(x)).length+'</span></button>').join('')}</div>
    <input class="cat-search" type="text" placeholder="Filter ${allInCat.length} ${state.activeCategory.toLowerCase()}… (name or code)" value="${state.categoryFilter||''}" oninput="filterCategory(this.value)">
  </div>
  <div class="cab-grid">${items.length ? items.map(c=>cabCard(c,line)).join('') : '<p class="empty-hint">No matches for "'+(state.categoryFilter||'')+'" in '+state.activeCategory+'.</p>'}</div>`;
}
function setCategory(c){ state.activeCategory=c; state.categoryFilter=''; nav('category'); }
function filterCategory(val){
  state.categoryFilter = val;
  const line = state.project.line;
  const items = CATALOG.filter(c=>c.category===state.activeCategory && isBrowsable(c) && catalogItemMatches(c, val));
  const grid = document.querySelector('.cab-grid');
  if(grid) grid.innerHTML = items.length ? items.map(c=>cabCard(c,line)).join('') : '<p class="empty-hint">No matches for "'+val+'" in '+state.activeCategory+'.</p>';
}
function cabCard(c, line){
  const ok = c.lines.includes(line);
  const color = ok?('var(--'+line+')'):'var(--ink-muted)';
  const wRange = c.widths.length>1 ? (c.widths[0]+'–'+c.widths[c.widths.length-1]+'"') : (c.widths[0]+'"');
  return `<div class="cab-card ${ok?'available':'unavailable'}" ${ok?('onclick="openDetail(\''+c.id+'\')"'):''}>
    <div class="cab-thumb" style="background:${ok?'var(--'+line+'-bg)':'var(--surface-1)'}">
      ${cabPhotoHTML(c, color, 38)}
    </div>
    <div class="cab-body">
      <p class="cab-name">${c.name}</p>
      <p class="cab-code">${c.id} · ${wRange}</p>
      ${ok ? '<span class="cab-avail-badge" style="background:var(--'+line+'-bg);color:var(--'+line+'-tx)">Available</span>' : '<span class="cab-avail-badge">Not available in '+LINES[line].label+'</span>'}
    </div>
  </div>`;
}

function renderBreakdown(pb, qty){

  return '<div class="breakdown">'+rows+

    '<div class="breakdown-line net"><span>Dealer net (× '+qty+')</span><span>'+fmt(pb.netUnit*qty)+'</span></div>'+
  '</div>';
}
function renderCabinetDetail(){
  const line = state.project.line;
  const item = state.detailItem;
  const c = cab(item.cabId);
  const pb = priceBreakdown(item, line);
  const code = codeFor(item, line);
  const hasDrawers = c.drawers.length>0;
  const hasHeight = !!c.heights;
  const isBase = c.category==='Base Cabinets' || c.category==='Base Corners';

  let html = '';
  html += breadcrumb();
  html += '<button class="btn-ghost" onclick="nav(\'category\')">‹ Back to '+state.activeCategory+'</button>';
  html += '<div class="detail-layout" style="margin-top:14px;">';

  html += '<p class="dp-name">'+c.name+'</p><div class="dp-code">'+code+'</div></div>';

  html += '<div class="detail-panel">';

  html += '<div class="config-card"><h4>Size</h4><div class="config-row">';
  html += '<div class="config-field"><label>Width (1/16")</label><input type="number" step="0.0625" min="'+c.widths[0]+'" max="'+c.widths[c.widths.length-1]+'" value="'+item.width+'" onchange="setDetail(\'width\',Math.min('+c.widths[c.widths.length-1]+',Math.max('+c.widths[0]+',Math.round((parseFloat(this.value)||'+c.widths[0]+')*16)/16)))"><div class="field-hint">'+fmtWidth(item.width)+' · range '+c.widths[0]+'"–'+c.widths[c.widths.length-1]+'"</div></div>';
  if(isBase){
    const bh0=28, bh1=48, bd0=9, bd1=30;
    const curH = itemDims(item).height, curD = itemDims(item).depth;
    html += '<div class="config-field"><label>Height (in)</label><input type="number" step="0.0625" min="'+bh0+'" max="'+bh1+'" value="'+curH+'" onchange="setDetail(\'height\',Math.min('+bh1+',Math.max('+bh0+',Math.round((parseFloat(this.value)||'+bh0+')*16)/16)))"><div class="field-hint">'+fmtWidth(curH)+' · range '+bh0+'"–'+bh1+'"</div></div>';
    html += '<div class="config-field"><label>Depth (in)</label><input type="number" step="0.0625" min="'+bd0+'" max="'+bd1+'" value="'+curD+'" onchange="setDetail(\'depth\',Math.min('+bd1+',Math.max('+bd0+',Math.round((parseFloat(this.value)||'+bd0+')*16)/16)))"><div class="field-hint">'+fmtWidth(curD)+' · range '+bd0+'"–'+bd1+'"</div></div>';
  } else if(hasHeight) html += '<div class="config-field"><label>Height</label><select onchange="setDetail(\'height\',parseInt(this.value))">'+c.heights.map(h=>'<option value="'+h+'" '+(h===item.height?'selected':'')+'>'+h+'"</option>').join('')+'</select></div>';
  html += '</div></div>';

  html += '<div class="config-card"><h4>Construction</h4><div class="config-row">';
  html += '<div class="config-field"><label>Door style / frame bead</label><select onchange="setDetail(\'doorStyle\',this.value)">'+optionList(DOOR_STYLES,item.doorStyle)+'</select></div>';
  html += '<div class="config-field"><label>Panel profile</label><select onchange="setDetail(\'panel\',this.value)">'+optionList(PANELS,item.panel)+'</select></div>';
  html += '<div class="config-field"><label>Wood species</label><select onchange="setDetail(\'species\',this.value)">'+optionList(SPECIES,item.species)+'</select></div>';
  if(hasDrawers) html += '<div class="config-field"><label>Drawer box</label><select onchange="setDetail(\'drawerBoxMaterial\',this.value)"><option value="poplar" '+(item.drawerBoxMaterial==='poplar'?'selected':'')+'>Poplar</option><option value="plywood" '+(item.drawerBoxMaterial==='plywood'?'selected':'')+'>Plywood (−5%)</option></select></div>';
  html += '</div></div>';

  html += '<div class="config-card"><h4>Finish</h4><div class="config-row">';
  html += '<div class="config-field"><label>Color</label><select onchange="setDetail(\'finish\',this.value)">'+optionList(FINISH_COLORS,item.finish)+'</select></div>';
  html += '<div class="config-field"><label>Sheen</label><select onchange="setDetail(\'sheen\',this.value)">'+optionList(SHEENS,item.sheen)+'</select></div>';
  html += '</div></div>';

  html += '<div class="config-card"><h4>Modifications</h4><div class="mod-grid">';
  if(!c.accessory){
    html += '<label class="check-row"><input type="checkbox" '+(item.mods.finishedLeft?'checked':'')+' onchange="setDetailMod(\'finishedLeft\',this.checked)"> Finished left side</label>';
    html += '<label class="check-row"><input type="checkbox" '+(item.mods.finishedRight?'checked':'')+' onchange="setDetailMod(\'finishedRight\',this.checked)"> Finished right side</label>';
    html += '<label class="check-row"><input type="checkbox" '+(item.mods.applianceSide?'checked':'')+' onchange="setDetailMod(\'applianceSide\',this.checked)"> Appliance side</label>';
  }
  html += '</div>';
  if(!c.accessory){
    html += '<div class="config-row" style="margin-top:10px;">';

      html += '<div class="config-field"><label>Drawer box logo</label><select onchange="setDetailMod(\'drawerLogo\',this.value)"><option value="none" '+(item.mods.drawerLogo==='none'?'selected':'')+'>None</option><option value="top" '+(item.mods.drawerLogo==='top'?'selected':'')+'>Top drawer</option><option value="all" '+(item.mods.drawerLogo==='all'?'selected':'')+'>All drawers</option></select></div>';
    }
    html += '</div>';
    if(isBase){
      html += '<div style="margin-top:12px;"><label style="display:block;font-size:11.5px;font-weight:700;color:var(--ink-secondary);margin-bottom:6px;">4" Roll-outs</label>';
      html += '<div class="qty-stepper"><button onclick="adjustRollout(-1)">−</button><span>'+item.mods.rolloutQty+'</span><button onclick="adjustRollout(1)">+</button></div></div>';
    }
  }
  html += '<div class="config-row" style="margin-top:12px;">';
  html += '<div class="config-field"><label>Custom mod (%)</label><input type="number" min="0" max="100" value="'+item.mods.customModPct+'" onchange="setDetailMod(\'customModPct\',parseFloat(this.value)||0)"></div>';
  html += '<div class="config-field" style="grid-column:span 2;"><label>Custom mod description</label><input type="text" value="'+item.mods.customModDesc+'" placeholder="Describe the modification" oninput="state.detailItem.mods.customModDesc=this.value"></div>';
  html += '</div></div>';

  html += '<div style="margin-top:16px;"><label style="display:block;font-size:11.5px;font-weight:700;color:var(--ink-secondary);margin-bottom:6px;">Quantity</label>';
  html += '<div class="qty-stepper"><button onclick="adjustDetailQty(-1)">−</button><span>'+item.qty+'</span><button onclick="adjustDetailQty(1)">+</button></div></div>';

  html += '</div></div>';
  return html;

    <td class="cell-price">${fmt(pb.listUnit*it.qty)}</td>
    <td class="cell-price">${fmt(pb.netUnit*it.qty)}</td>
    <td><button class="btn-danger-ghost" onclick="removeItem(${i})">Remove</button></td>
  </tr>`;
}
function changeQty(i, delta){ state.quoteItems[i].qty = Math.max(1, state.quoteItems[i].qty+delta); render(); }
function removeItem(i){ state.quoteItems.splice(i,1); render(); }
function addRoom(){
  const name = window.prompt('Name this room (e.g. Pantry, Laundry, Bathroom)');
  if(name && name.trim()){ state.project.room = state.project.room+' + '+name.trim(); }
  nav('category');
}

/* ================= Screen: Quote Review ================= */
function renderQuoteReview(){
  const line = state.project.line;
  const t = computeTotals(state.quoteItems, line);
  const readOnlyBanner = state.readOnly ? '<div class="card" style="padding:14px 18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:var(--ink-secondary);">This quote has already been submitted.</span><span class="status-pill wait">'+(state.reviewStatus||'')+'</span></div>' : '';
  const readOnlyActions = '<button class="btn-secondary" onclick="nav(\'dashboard\')">Back to dashboard</button>';
  const editActions = '<button class="btn-ghost" onclick="nav(\'quoteBuilder\')">‹ Back to edit</button><button class="btn-secondary" onclick="requestQuote()">Request quote</button><button class="btn-primary" onclick="submitOrder()">Submit order</button>';
  return `
  ${breadcrumb()}
  ${pageHead('Quote review', state.readOnly ? 'Read-only summary.' : 'Confirm the details before you send this to Cabredo.')}
  ${readOnlyBanner}
  <div class="card" style="padding:20px 24px;margin-bottom:20px;">
    <div style="display:flex;gap:40px;flex-wrap:wrap;">
      <div><div class="cell-sub">Dealer</div><div class="cell-title">Kitchen Designs LLC</div></div>
      <div><div class="cell-sub">Project</div><div class="cell-title">${state.project.name}</div></div>
      <div><div class="cell-sub">Room</div><div class="cell-title">${state.project.room}</div></div>
      <div><div class="cell-sub">Product line</div><span class="line-tag ${line}"><span class="swatch"></span>${LINES[line].label}</span></div>
    </div>
  </div>
  <div class="card">
    <table class="dtable">
      <thead><tr><th>Cabinet</th><th>Code</th><th>Qty</th><th>List</th><th>Net</th></tr></thead>
      <tbody>${state.quoteItems.map(it=>reviewRow(it,line)).join('')}</tbody>
    </table>
    <div class="totals-bar">
      <div class="t-block"><div class="t-label">Cabinets</div><div class="t-val">${t.qty}</div></div>
      <div class="t-block"><div class="t-label">List total</div><div class="t-val">${fmt(t.list)}</div></div>
      <div class="t-block"><div class="t-label">Net total</div><div class="t-val">${fmt(t.net)}</div></div>
    </div>
  </div>
  <div class="action-row">${state.readOnly ? readOnlyActions : editActions}</div>`;
}
function reviewRow(it, line){
  const c = cab(it.cabId); const pb = priceBreakdown(it, line);
  return '<tr><td><div class="cell-title">'+c.name+'</div><div class="cell-sub">'+fmtWidth(it.width)+(it.height?(' × '+it.height+'"'):'')+'</div></td><td class="cell-sub">'+codeFor(it,line)+'</td><td>'+it.qty+'</td><td class="cell-price">'+fmt(pb.listUnit*it.qty)+'</td><td class="cell-price">'+fmt(pb.netUnit*it.qty)+'</td></tr>';
}
function requestQuote(){ nav('submitted', {submitMode:'quote'}); }
function submitOrder(){ nav('submitted', {submitMode:'order'}); }

/* ================= Screen: Submitted ================= */
function renderSubmitted(){
  const isOrder = state.submitMode==='order';
  const ref = (isOrder?'CB-1':'Q-2') + Math.floor(10000+Math.random()*89999);
  return `<div class="confirm-wrap">
    <div class="confirm-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--an-tx)" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>${isOrder ? 'Order submitted' : 'Quote requested'}</h1>
    <p>${state.project.name} — ${state.project.room}</p>
    <p>${isOrder ? 'Cabredo will begin processing this order.' : 'Your Cabredo rep will follow up shortly.'}</p>
    <div class="confirm-ref">${ref}</div>
    <div class="action-row" style="justify-content:center;">
      <button class="btn-primary" onclick="nav('dashboard')">Back to dashboard</button>
      <button class="btn-secondary" onclick="startNewProject()">Start another project</button>
    </div>
  </div>`;
}

/* ================= Initialization ================= */
render();
</script>
</body>
</html>
